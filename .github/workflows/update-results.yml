name: Update World Cup Results

on:
  workflow_dispatch:
  # Runs automatically every 30 minutes.
  # GitHub Actions cron schedules use UTC time.
  # Runs at:
  # - 19:00, 19:30, ..., 23:30 UTC
  # - 00:00, 00:30, ..., 07:30 UTC
  schedule:
  - cron: '0,30 19-23 * * *'
  - cron: '0,15 0-10 * * *'
permissions:
  contents: write

concurrency:
  group: update-world-cup-results
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Initialize run log
        run: |
          mkdir -p logs
          {
            echo "workflow=update-results"
            echo "run_id=${{ github.run_id }}"
            echo "run_attempt=${{ github.run_attempt }}"
            echo "event_name=${{ github.event_name }}"
            echo "ref_name=${{ github.ref_name }}"
            echo "started_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo
          } > logs/update-results.log

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      

      # This script runs inside a GitHub Actions runner (ubuntu) (not on a local machine or dedicated server.),
      # Executes the Node.js script that fetches and generates (public/scripts/generate-updated-results.mts)
      # the latest World Cup results using the configured OpenAI model.
      - name: Generate updated results
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.5
        run: |
          {
            echo "== generate-updated-results start $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
            node --experimental-strip-types scripts/generate-updated-results.mts
            echo "== generate-updated-results end $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
            echo
          } 2>&1 | tee -a logs/update-results.log
    # If updated-results.json has changed, commit and push
      # the new file back to the current branch.
      - name: Commit updated results
        run: |
          {
            echo "== commit step start $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
          } >> logs/update-results.log

          if git diff --quiet -- src/server/data/world-cup-schedule.json; then
            echo "No result updates to commit."
            echo "No result updates to commit." >> logs/update-results.log
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/server/data/world-cup-schedule.json
          git commit -m "Update world cup results"
          git push origin HEAD:${{ github.ref_name }}
          {
            echo "Committed and pushed updated results."
            echo "== commit step end $(date -u '+%Y-%m-%dT%H:%M:%SZ') =="
            echo
          } >> logs/update-results.log

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-results-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: logs/update-results.log
